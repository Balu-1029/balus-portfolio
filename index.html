<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="./style.css" />
</head>
<body>
    <!-- Header -->
    <header id="header">
        <div class="logo">BALAJI KOTA<span>.</span></div>
        <div class="header-actions">
            <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Switch to dark mode">
                <span class="theme-icon">🌙</span>
            </button>
            <ul>
                <li><a href="./index.html">HOME</a></li>
                <li><a href="./about.html">ABOUT</a></li>
                <li><a href="./projects.html">PROJECTS</a></li>
                <li><a href="./contact.html">CONTACT</a></li>
            </ul>
        </div>
    </header>

    <!-- Hero -->
    <section id="home" class="hero">
    <div class="hero-content">
        <p class="eyebrow">HELLO, I'M</p>
        <h1>BALAJI KOTA</h1>
        <p class="tagline">Aspiring Software Engineer | Python Developer | Web Developer | Building clean, thoughtful web experiences.</p>
        <div class="hero-buttons">
            <a href="./projects.html" class="btn">View Projects</a>
            <a href="https://drive.google.com/file/d/1kyGY6R2gqptXvsTjLhKB66tDxXclvtXq/view?usp=drive_link" class="btn">View My Resume</a>

    </div>
    </section>
    
    <!-- Footer -->
    <footer class="footer">
        <h4>&copy; 2026 Balaji Kota. All Rights Reserved.</h4>
    </footer>

    <script>
      (function () {
        const storedTheme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const theme = storedTheme || (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      })();

      const toggleButton = document.getElementById('theme-toggle');
      const themeIcon = toggleButton?.querySelector('.theme-icon');

      function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
        if (themeIcon) {
          themeIcon.textContent = theme === 'dark' ? '☀️' : '🌙';
        }
        if (toggleButton) {
          toggleButton.setAttribute('aria-label', theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
        }
      }

      const initialTheme = document.documentElement.getAttribute('data-theme') || 'light';
      applyTheme(initialTheme);

      toggleButton?.addEventListener('click', () => {
        const currentTheme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        applyTheme(currentTheme);
      });
    </script>

</body>
</html>
